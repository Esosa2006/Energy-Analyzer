<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* Shared sidebar used by all 4 dashboard pages */-->
<aside th:fragment="sidebar" class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">⚡</div>
        <div>
            <div class="logo-text">Energy Analyzer</div>
            <div class="logo-sub">Static Analysis</div>
        </div>
    </div>

    <div class="nav-section">
        <div class="nav-label">Analysis</div>
        <a href="/dashboard/summary"  class="nav-item" th:classappend="${activePage == 'summary'}  ? ' active' : ''">📊 Summary</a>
        <a href="/dashboard/charts"   class="nav-item" th:classappend="${activePage == 'charts'}   ? ' active' : ''">📈 Charts</a>
        <a href="/dashboard/methods"  class="nav-item" th:classappend="${activePage == 'methods'}  ? ' active' : ''">🔍 Methods</a>
        <a href="/dashboard/hotspots" class="nav-item" th:classappend="${activePage == 'hotspots'} ? ' active' : ''">🔥 Hotspots</a>
    </div>

    <div class="nav-section">
        <div class="nav-label">Export</div>
        <a href="/export/csv" class="nav-item">📄 Export CSV</a>
        <a href="/export/pdf" class="nav-item">📑 Export PDF</a>
    </div>

    <div class="nav-section">
        <div class="nav-label">Navigation</div>
        <a href="/" class="nav-item">⬆ New Analysis</a>
        <a href="/demo" class="nav-item">🎯 Demo Data</a>
    </div>

    <div th:if="${report.sessionCpuUsagePercent != null}" class="session-box">
        <div class="session-label">Analyzer Session*</div>
        <div class="session-stat">CPU: <span th:text="${#numbers.formatDecimal(report.sessionCpuUsagePercent,1,1)} + '%'"></span></div>
        <div class="session-stat">RAM: <span th:text="${report.sessionMemoryUsedMb} + ' MB'"></span></div>
        <div class="session-stat">JVM: <span th:text="${report.analyzerJvmVersion}"></span></div>
        <div class="session-stat">Time: <span th:text="${report.formattedDuration}"></span></div>
        <div class="session-note">*Analyzer resource usage, NOT analyzed code energy</div>
    </div>
</aside>

<!--/* Shared CSS used by all 4 pages */-->
<th:block th:fragment="shared-styles">
    <style>
        :root {
            --bg:#080c18; --surface:#0f1629; --surface2:#162035; --surface3:#1c2940;
            --border:#1e2d45; --border2:#243652; --accent:#00d4aa; --accent2:#7c3aed;
            --text:#e2e8f0; --text2:#94a3b8; --muted:#475569;
            --danger:#ef4444; --warning:#f59e0b; --success:#22c55e; --orange:#f97316;
            --mono:'JetBrains Mono',monospace;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
        .layout{display:flex;min-height:100vh;position:relative;z-index:1;}
        .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
        .sidebar-logo{display:flex;align-items:center;gap:0.75rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
        .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
        .logo-text{font-weight:700;font-size:0.88rem;}.logo-sub{color:var(--muted);font-size:0.7rem;}
        .nav-section{margin-bottom:1.5rem;}
        .nav-label{font-size:0.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:0 0.5rem;margin-bottom:0.5rem;}
        .nav-item{display:flex;align-items:center;gap:0.6rem;padding:0.55rem 0.75rem;border-radius:8px;font-size:0.83rem;color:var(--text2);cursor:pointer;transition:all 0.15s;text-decoration:none;}
        .nav-item:hover,.nav-item.active{background:var(--surface2);color:var(--accent);}
        .session-box{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);}
        .session-label{font-size:0.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.6rem;}
        .session-stat{font-size:0.75rem;color:var(--muted);font-family:var(--mono);margin-bottom:0.25rem;}
        .session-stat span{color:var(--text);}
        .session-note{font-size:0.66rem;color:var(--muted);margin-top:0.5rem;line-height:1.5;}
        .main{flex:1;padding:2rem;overflow-x:hidden;min-width:0;}
        .demo-notice{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);color:#c4b5fd;border-radius:10px;padding:0.75rem 1.25rem;margin-bottom:1.5rem;font-size:0.83rem;display:flex;align-items:center;gap:0.6rem;}
        .demo-notice a{color:var(--accent);}
        .disclaimer{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.15);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:0.8rem;color:var(--text2);line-height:1.6;}
        .disclaimer strong{color:var(--accent);}
        .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
        .header-left h1{font-size:1.4rem;font-weight:700;}.project-name{color:var(--accent);}
        .header-meta{display:flex;gap:0.6rem;margin-top:0.5rem;flex-wrap:wrap;}
        .meta-tag{font-size:0.75rem;color:var(--muted);font-family:var(--mono);background:var(--surface);padding:0.2rem 0.6rem;border-radius:6px;border:1px solid var(--border);}
        .header-actions{display:flex;gap:0.6rem;flex-wrap:wrap;}
        .btn{padding:0.5rem 1rem;border-radius:9px;font-size:0.83rem;font-weight:500;cursor:pointer;text-decoration:none;font-family:'Space Grotesk',sans-serif;transition:all 0.15s;border:1px solid transparent;display:inline-flex;align-items:center;gap:0.4rem;}
        .btn-outline{background:transparent;border-color:var(--border);color:var(--text2);}
        .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
        .btn-accent{background:var(--accent);color:#080c18;font-weight:700;border-color:var(--accent);}
        .build-banner{border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;}
        .build-banner.pass{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);}
        .build-banner.fail{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);}
        .build-status{display:flex;align-items:center;gap:1rem;}
        .build-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
        .pass .build-dot{background:var(--success);box-shadow:0 0 10px var(--success);}
        .fail .build-dot{background:var(--danger);box-shadow:0 0 10px var(--danger);animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        .build-label{font-weight:700;font-size:1rem;}
        .pass .build-label{color:var(--success);}.fail .build-label{color:var(--danger);}
        .build-detail{font-size:0.82rem;color:var(--text2);margin-top:0.2rem;}
        .build-violations{font-size:0.78rem;font-family:var(--mono);}
        .build-violations li{color:#fca5a5;list-style:none;padding:0.15rem 0;}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;}
        .stat-label{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.5rem;}
        .stat-value{font-size:2rem;font-weight:700;font-family:var(--mono);line-height:1;}
        .stat-sub{font-size:0.72rem;color:var(--muted);margin-top:0.4rem;}
        .grade-A{color:var(--success);}.grade-B{color:#84cc16;}.grade-C{color:var(--warning);}.grade-D{color:var(--orange);}.grade-F{color:var(--danger);}
        .nav-card{display:block;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;text-decoration:none;color:var(--text);transition:all 0.15s;}
        .nav-card:hover{border-color:var(--accent);background:var(--surface2);}
        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem;}
        .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;}
        .chart-card.full{grid-column:1/-1;}
        .chart-title{font-size:0.85rem;font-weight:600;margin-bottom:1rem;color:var(--text2);}
        .chart-wrap{position:relative;height:240px;}.chart-wrap.tall{height:300px;}
        .table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1.5rem;overflow:hidden;}
        .table-header{padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;}
        .table-title{font-size:0.92rem;font-weight:600;}
        .filter-row{display:flex;gap:0.4rem;flex-wrap:wrap;}
        .filter-btn{padding:0.28rem 0.7rem;border-radius:100px;font-size:0.73rem;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.15s;}
        .filter-btn:hover,.filter-btn.active{background:var(--accent);color:#080c18;border-color:var(--accent);font-weight:700;}
        .table-scroll{overflow-x:auto;}
        table{width:100%;border-collapse:collapse;font-size:0.82rem;}
        thead th{padding:0.7rem 1rem;text-align:left;font-size:0.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);white-space:nowrap;}
        tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
        tbody tr:hover{background:var(--surface2);}
        tbody tr:last-child{border-bottom:none;}
        td{padding:0.8rem 1rem;vertical-align:middle;}
        .method-name{font-family:var(--mono);font-size:0.8rem;font-weight:500;}
        .class-name{color:var(--muted);font-size:0.72rem;font-family:var(--mono);margin-top:0.15rem;}
        .eei-wrap{display:flex;align-items:center;gap:0.5rem;min-width:110px;}
        .eei-bar-bg{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;}
        .eei-bar-fill{height:100%;border-radius:3px;}
        .eei-num{font-family:var(--mono);font-size:0.78rem;font-weight:600;width:30px;text-align:right;flex-shrink:0;}
        .tier-badge{display:inline-flex;align-items:center;padding:0.2rem 0.65rem;border-radius:100px;font-size:0.7rem;font-weight:600;white-space:nowrap;}
        .tier-LOW{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.2);}
        .tier-MEDIUM{background:rgba(234,179,8,0.12);color:#fbbf24;border:1px solid rgba(234,179,8,0.2);}
        .tier-HIGH{background:rgba(249,115,22,0.12);color:#fb923c;border:1px solid rgba(249,115,22,0.2);}
        .tier-CRITICAL{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
        .cmplx-badge{font-family:var(--mono);font-size:0.73rem;padding:0.17rem 0.5rem;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;white-space:nowrap;}
        .cmplx-O_2N{color:#f87171;border-color:rgba(239,68,68,0.3);}
        .cmplx-O_N3{color:#fb923c;border-color:rgba(249,115,22,0.3);}
        .cmplx-O_N2{color:#fbbf24;border-color:rgba(234,179,8,0.3);}
        .cmplx-O_N{color:#86efac;border-color:rgba(34,197,94,0.2);}
        .cmplx-O_1{color:#6ee7b7;border-color:rgba(0,212,170,0.2);}
        .num{font-family:var(--mono);font-size:0.8rem;text-align:center;}
        .hotspot-yes{color:var(--warning);font-size:0.78rem;font-weight:700;}
        .hotspot-no{color:var(--muted);font-size:0.73rem;}
        .suggest-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.75rem;font-family:'Space Grotesk',sans-serif;padding:0;white-space:nowrap;}
        .suggest-row{display:none;}
        .suggest-panel{padding:1rem 1.5rem;background:var(--surface2);border-top:1px solid var(--border);}
        .suggest-item{background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:0.9rem;margin-bottom:0.6rem;}
        .suggest-item:last-child{margin-bottom:0;}
        .suggest-title{font-weight:600;font-size:0.82rem;margin-bottom:0.4rem;display:flex;align-items:center;gap:0.5rem;}
        .p-HIGH{color:var(--danger);}.p-MEDIUM{color:var(--warning);}.p-LOW{color:var(--success);}
        .suggest-why{font-size:0.77rem;color:var(--text2);margin-bottom:0.35rem;line-height:1.55;}
        .suggest-how{font-size:0.77rem;color:var(--text);line-height:1.55;}
        .suggest-code{margin-top:0.5rem;background:#060a10;border:1px solid var(--border);border-radius:7px;padding:0.75rem;font-family:var(--mono);font-size:0.73rem;color:#a5f3fc;white-space:pre;overflow-x:auto;line-height:1.6;}
        .suggest-gain{margin-top:0.4rem;font-size:0.7rem;color:var(--success);}
        .hotspot-card{background:var(--surface2);border:1px solid rgba(249,115,22,0.2);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
        .hotspot-card:last-child{margin-bottom:0;}
        .hotspot-name{font-family:var(--mono);font-weight:600;color:var(--warning);font-size:0.9rem;}
        .hotspot-badges{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;margin-bottom:0.75rem;}
        .hotspot-reasons{font-size:0.8rem;color:var(--text2);}
        .hotspot-reasons li{padding:0.2rem 0;display:flex;gap:0.5rem;list-style:none;}
        .hotspot-reasons li::before{content:'→';color:var(--danger);flex-shrink:0;}
        .empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:0.9rem;}
        @media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:900px){.sidebar{display:none;}.charts-grid{grid-template-columns:1fr;}}
        @media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr;}}
    </style>
</th:block>

<!--/* Shared Chart.js rendering scripts */-->
<th:block th:fragment="chart-scripts">
    <script>
        const TIER_COLORS={LOW:'#22c55e',MEDIUM:'#eab308',HIGH:'#f97316',CRITICAL:'#ef4444'};
        const COMPLEXITY_COLORS={O_1:'#00d4aa',O_N:'#22c55e',O_N2:'#eab308',O_N3:'#f97316',O_2N:'#ef4444'};
        const COMPLEXITY_LABELS={O_1:'O(1)',O_N:'O(n)',O_N2:'O(n²)',O_N3:'O(n³)',O_2N:'O(2ⁿ)'};
        const TIER_LABELS={LOW:'Low Impact',MEDIUM:'Medium Impact',HIGH:'High Impact',CRITICAL:'Critical Impact'};
        function eeiColor(s){return s>=70?'#22c55e':s>=50?'#eab308':s>=30?'#f97316':'#ef4444';}
        function shortLabel(s,max){return s.length>max?'…'+s.slice(-(max-1)):s;}
        const gridColor='rgba(30,45,69,0.8)',tickColor='#475569';
        Chart.defaults.font.family="'Space Grotesk',sans-serif";
        Chart.defaults.color='#94a3b8';

        (function(){
            const ctx=document.getElementById('eeiChart');
            if(!ctx||!eeiScores.length)return;
            const colors=eeiScores.map(eeiColor);
            new Chart(ctx,{type:'bar',data:{
                labels:methodLabels.map(l=>shortLabel(l,28)),
                datasets:[
                    {label:'EEI Score',data:eeiScores,backgroundColor:colors.map(c=>c+'99'),borderColor:colors,borderWidth:1.5,borderRadius:5},
                    {label:'Threshold ('+threshold+')',data:new Array(eeiScores.length).fill(threshold),type:'line',borderColor:'#7c3aed',borderDash:[6,3],borderWidth:1.5,pointRadius:0,fill:false}
                ]
            },options:{responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{boxWidth:12}}},
                scales:{y:{min:0,max:100,grid:{color:gridColor},ticks:{color:tickColor}},x:{grid:{display:false},ticks:{color:tickColor,maxRotation:45,font:{size:11}}}}}});
        })();

        (function(){
            const ctx=document.getElementById('tierChart');
            if(!ctx)return;
            const keys=Object.keys(tierCounts);if(!keys.length)return;
            new Chart(ctx,{type:'doughnut',data:{
                labels:keys.map(k=>TIER_LABELS[k]||k),
                datasets:[{data:keys.map(k=>tierCounts[k]),backgroundColor:keys.map(k=>(TIER_COLORS[k]||'#64748b')+'cc'),borderColor:keys.map(k=>TIER_COLORS[k]||'#64748b'),borderWidth:2}]
            },options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:14}}}}});
        })();

        (function(){
            const ctx=document.getElementById('complexityChart');
            if(!ctx)return;
            const keys=Object.keys(complexityCounts);if(!keys.length)return;
            new Chart(ctx,{type:'polarArea',data:{
                labels:keys.map(k=>COMPLEXITY_LABELS[k]||k),
                datasets:[{data:keys.map(k=>complexityCounts[k]),backgroundColor:keys.map(k=>(COMPLEXITY_COLORS[k]||'#64748b')+'aa'),borderColor:keys.map(k=>COMPLEXITY_COLORS[k]||'#64748b'),borderWidth:2}]
            },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:12}}},scales:{r:{grid:{color:gridColor},ticks:{backdropColor:'transparent',color:tickColor}}}}});
        })();

        (function(){
            const ctx=document.getElementById('weightedChart');
            if(!ctx||!weightedScores.length)return;
            const colors=eeiScores.map(eeiColor);
            new Chart(ctx,{type:'bar',data:{
                labels:methodLabels.map(l=>shortLabel(l,28)),
                datasets:[{label:'Weighted EEI',data:weightedScores,backgroundColor:colors.map(c=>c+'88'),borderColor:colors,borderWidth:1.5,borderRadius:5}]
            },options:{responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{boxWidth:12}}},
                scales:{y:{grid:{color:gridColor},ticks:{color:tickColor}},x:{grid:{display:false},ticks:{color:tickColor,maxRotation:45,font:{size:11}}}}}});
        })();
    </script>
</th:block>

</body>
</html>
